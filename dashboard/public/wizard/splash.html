<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>i56 · Splash — Genus is starting</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f5f7;--surface:#fff;--surface2:#f0f1f4;--sidebar-bg:#fbfbfc;--border:rgba(20,22,28,.07);--border-strong:rgba(20,22,28,.12);--text:#16181d;--text-dim:#6b7280;--text-faint:#9aa1ae;--text-veryfaint:#aab0bb;--accent:#2f6bff;--accent-bg:rgba(47,107,255,.1);--accent-border:rgba(47,107,255,.2);--green:#0e9f6e;--green-fg:#0c8a4f;--green-bg:#eafaf1;--green-border:#c6ecd4;--yellow:#e0a008;--yellow-fg:#a9790a;--yellow-bg:#fbf3da;--red:#df4b3f;--red-fg:#c63a30;--red-bg:#fdebe9;--red-border:#f6cfca;--pad:22px;--gap:20px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--text)}
a{color:var(--accent);text-decoration:none}a:hover{color:#4c7eff}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}
.mono{font-family:'JetBrains Mono',monospace}
.wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.stack{width:100%;max-width:560px;display:flex;flex-direction:column;gap:14px}
.stack-wide{max-width:640px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 1px 2px rgba(16,18,28,.04),0 6px 18px rgba(16,18,28,.03);padding:40px 42px}
.step{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint)}
h1{font-size:26px;font-weight:800;letter-spacing:-.025em;line-height:1.1;margin-top:10px}
.sub{font-size:14.5px;line-height:1.6;color:var(--text-dim);margin-top:8px}
.btn{display:inline-flex;align-items:center;gap:8px;border:none;background:var(--accent);color:#fff;border-radius:9px;padding:11px 22px;font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer}
.btn:hover{background:#4c7eff}
.btn[disabled]{opacity:.75}
.btn-ghost{border:1px solid var(--border-strong);background:var(--surface);color:var(--text);border-radius:9px;padding:10px 16px;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-link{border:none;background:transparent;color:var(--text-dim);font-family:inherit;font-size:13.5px;font-weight:500;cursor:pointer;padding:11px 4px}
.btn-link:hover{color:var(--accent)}
.spinner{width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:99px;animation:spin .7s linear infinite;display:inline-block}
.foot{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-veryfaint);text-align:center;letter-spacing:.02em}
label{display:block;font-size:13px;font-weight:600}
.hint{font-size:12px;color:var(--text-faint);margin-top:3px}
input[type=text],input[type=password]{width:100%;margin-top:9px;border:1px solid var(--border-strong);background:var(--surface);border-radius:9px;padding:11px 13px;font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--text)}
input:focus{outline:none;border-color:var(--accent)}
input.err-input{border-color:var(--red)}
.err-msg{font-size:12.5px;color:var(--red-fg);margin-top:7px;line-height:1.45}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:30px}
.key-banner{display:flex;align-items:flex-start;gap:10px;background:var(--yellow-bg);border:1px solid #f0e0ab;border-radius:11px;padding:12px 15px;color:var(--yellow-fg);font-size:13px;line-height:1.55}
.key-banner code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:rgba(255,255,255,.6);padding:1px 5px;border-radius:4px}
.dot{width:8px;height:8px;border-radius:99px;background:var(--yellow);flex:none;margin-top:5px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:300;display:flex;align-items:center;gap:12px;border-radius:11px;padding:11px 17px;box-shadow:0 8px 24px rgba(16,18,28,.14);max-width:520px;font-size:13.5px;font-weight:500}
.toast-error{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red-fg)}
.toast-neutral{background:var(--surface);border:1px solid var(--border-strong);color:var(--text)}
.conn{border:1px solid var(--border);border-radius:12px;padding:13px 15px;background:var(--surface)}
.conn.connected{border-color:var(--green-border);background:#fbfefc}
.conn.skipped{opacity:.55}
.conn-head{display:flex;align-items:center;gap:13px}
.conn-icon{width:34px;height:34px;flex:none;border-radius:9px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--text-dim)}
.conn-name{font-size:14px;font-weight:600}
.conn-desc{font-size:12px;color:var(--text-faint);margin-top:1px}
.conn-body{flex:1;min-width:0}
.conn-actions{display:flex;align-items:center;gap:7px}
.btn-connect{border:1px solid var(--accent);color:var(--accent);background:transparent;border-radius:8px;padding:6px 13px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer}
.btn-connect:hover{background:var(--accent);color:#fff}
.chip-skip{border:1px solid var(--border-strong);color:var(--text-faint);background:var(--surface);border-radius:99px;padding:6px 12px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.chip-connected{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--green-fg);background:var(--green-bg);border:1px solid var(--green-border);border-radius:99px;padding:4px 11px}
.chip-skipped{font-size:12px;font-weight:600;color:var(--text-faint);background:var(--surface2);border-radius:99px;padding:4px 11px}
.link-sm{border:none;background:transparent;color:var(--text-faint);font-family:inherit;font-size:12px;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.conn-token{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)}
.conn-token input{flex:1;margin-top:0;font-size:12.5px;padding:8px 11px;border-radius:8px}
.btn-sm{border:none;background:var(--accent);color:#fff;border-radius:8px;padding:8px 14px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer}
.btn-sm-ghost{border:1px solid var(--border-strong);background:var(--surface);color:var(--text-dim);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer}
.shell{display:flex;height:100vh;overflow:hidden}
.shell-col{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.shell-row{flex:1;min-height:0;display:flex}
.sidebar{width:252px;flex:none;display:flex;flex-direction:column;background:var(--sidebar-bg);border-right:1px solid var(--border);padding:16px 14px;position:relative}
.bu-switcher{display:flex;align-items:center;gap:11px;width:100%;padding:8px 9px;border:none;background:transparent;border-radius:11px;cursor:pointer;text-align:left;font-family:inherit}
.bu-switcher:hover{background:rgba(20,22,28,.04)}
.bu-avatar{width:34px;height:34px;flex:none;border-radius:9px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;letter-spacing:-.02em;box-shadow:0 2px 6px rgba(47,107,255,.32)}
.bu-name{font-weight:700;font-size:14.5px;letter-spacing:-.01em}
.bu-meta{font-size:11px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;margin-top:1px}
.bu-menu{position:absolute;top:62px;left:12px;right:12px;background:var(--surface);border:1px solid var(--border-strong);border-radius:12px;box-shadow:0 8px 28px rgba(16,18,28,.14);padding:6px;z-index:50}
.bu-menu-row{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:8px;width:100%;border:none;background:transparent;font-family:inherit;text-align:left;cursor:pointer}
.bu-menu-row:hover{background:rgba(20,22,28,.04)}
.bu-menu-row.current{background:rgba(47,107,255,.08)}
.bu-mini{width:26px;height:26px;flex:none;border-radius:7px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px}
.demo-tag{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;color:var(--text-faint);background:var(--surface2);border-radius:4px;padding:2px 6px}
.side-div{height:1px;background:rgba(20,22,28,.06);margin:14px 4px}
.nav-link{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:10px;text-decoration:none;color:var(--text);font-size:14px;font-weight:500}
.nav-link:hover{background:rgba(20,22,28,.045)}
.nav-link.current{background:var(--accent-bg);color:var(--accent);font-weight:600}
.side-bottom{margin-top:auto;display:flex;flex-direction:column;gap:3px}
.main{flex:1;min-width:0;overflow-y:auto}
.main-inner{max-width:1120px;margin:0 auto;padding:38px 44px 80px}
.page-title{font-size:31px;font-weight:800;letter-spacing:-.025em;line-height:1.05;margin:0;margin-top:0}
.page-sub{margin-top:7px;color:var(--text-dim);font-size:15px}
.demo-chip{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--text-faint);background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:3px 10px}
.top-banner{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--accent-bg);border-bottom:1px solid var(--accent-border);padding:9px 16px;position:relative;flex:none}
.top-banner .msg{font-size:13px;color:var(--accent);font-weight:500}
.top-banner .cta{border:none;background:transparent;color:var(--accent);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.top-banner .x{position:absolute;right:14px;border:none;background:transparent;color:var(--accent);opacity:.6;cursor:pointer;font-size:15px;font-family:inherit;line-height:1}
.rail{position:fixed;bottom:14px;left:14px;z-index:400;display:flex;align-items:center;gap:4px;background:#16181d;border-radius:10px;padding:6px 8px;box-shadow:0 6px 20px rgba(16,18,28,.3)}
.rail span{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;color:rgba(255,255,255,.45);padding:0 5px}
.rail button{border:none;background:transparent;color:rgba(255,255,255,.6);border-radius:6px;padding:4px 9px;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer}
.rail button.on{background:rgba(47,107,255,.9);color:#fff}
.variant{display:none}
.variant.on{display:block}
</style>
</head>
<body>
<div class="wrap" style="gap:18px"><div style="width:11px;height:11px;border-radius:99px;background:var(--accent);animation:pulseDot 1.6s ease-in-out infinite;box-shadow:0 2px 8px rgba(47,107,255,.4)"></div><div style="font-size:17px;font-weight:600">Genus is starting…</div><div class="mono" style="font-size:11.5px;color:var(--text-faint);text-align:center;line-height:1.6">waiting for the dashboard at localhost:8080<br>first run can take a minute</div><div class="mono" style="font-size:10px;color:var(--text-veryfaint);margin-top:14px">this page refreshes automatically</div></div>

</body>
</html>
