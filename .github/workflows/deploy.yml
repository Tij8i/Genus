# Manual / emergency deploy of the genus-v06 Cloudflare Pages project.
#
# As of 2026-06-28 Cloudflare Pages' GitHub App is authorized on Tij8i/Genus
# directly, so every push (main + branches) auto-deploys on the Cloudflare
# side — production on `main`, preview on every other branch at
# <slug>.genus-v06.pages.dev. This workflow no longer needs to fire on push.
#
# Kept for the rare case where the Cloudflare-side build is broken and we
# need a manual override. Triggered only via the Actions tab
# (workflow_dispatch). It hits the Cloudflare Pages deployment endpoint
# which rebuilds whatever the project's production branch is (main).
#
# Required GitHub Actions secret on this repo:
#   CLOUDFLARE_API_TOKEN — already set via gh CLI

name: Manual deploy to Cloudflare Pages (emergency only)

on:
  workflow_dispatch:  # emergency manual deploy only
    inputs:
      reason:
        description: 'Why are we doing a manual deploy? (Cloudflare-side build broken? Stuck?)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify Cloudflare API token
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          echo "Verifying CLOUDFLARE_API_TOKEN against /user/tokens/verify"
          http_status=$(curl -sS -m 30 -o /tmp/verify_body -w '%{http_code}' \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" || echo "curl_failed")
          echo "  HTTP status: $http_status"
          echo "  Body length: $(wc -c </tmp/verify_body) bytes"
          if [ "$http_status" != "200" ]; then
            echo "  Body:"
            sed 's/^/    /' /tmp/verify_body
            echo "Token verification failed. Rotate CLOUDFLARE_API_TOKEN secret on Tij8i/Genus."
            exit 1
          fi
          python3 -c "
          import json
          d = json.load(open('/tmp/verify_body'))
          print(f'  Token status: {d.get(\"result\", {}).get(\"status\", \"?\")}')
          print(f'  Token id:     {d.get(\"result\", {}).get(\"id\", \"?\")}')
          "

      - name: Trigger Cloudflare Pages deployment
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: b7463ec5b56da2353ea9002736247be1
          CF_PROJECT: genus-v06
          # When triggered by `push` on main, INPUT_BRANCH is empty and we
          # let Cloudflare deploy the project default. When triggered via
          # `workflow_dispatch` with `-f branch=…`, we forward that branch
          # as a multipart form field so Cloudflare builds a preview from
          # any feature branch — see GEN-101 + the DEPLOY.md note about
          # the Cloudflare GitHub App not being authorized on Tij8i/Genus.
          INPUT_BRANCH: ${{ github.event.inputs.branch }}
        run: |
          set -e
          if [ -n "$INPUT_BRANCH" ]; then
            echo "Triggering Pages deploy for project=$CF_PROJECT, branch=$INPUT_BRANCH (on-demand preview)"
          else
            echo "Triggering Pages deploy for project=$CF_PROJECT, default production branch"
          fi
          http_status=$(curl -sS -m 60 -o /tmp/cf_resp -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            ${INPUT_BRANCH:+--form branch="$INPUT_BRANCH"} \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$CF_PROJECT/deployments" || echo "curl_failed")
          body_bytes=$(wc -c </tmp/cf_resp | tr -d ' ')
          echo "  HTTP status: $http_status"
          echo "  Body bytes:  $body_bytes"
          if [ "$http_status" != "200" ] || [ "$body_bytes" -lt 2 ]; then
            echo "  Body (first 2KB):"
            head -c 2048 /tmp/cf_resp | sed 's/^/    /'
            echo ""
            echo "Cloudflare did not return a usable JSON 200 response."
            echo "Common causes: expired/revoked token, missing Pages:Edit scope, rate limit, or Cloudflare API incident."
            exit 1
          fi
          python3 -c "
          import json, sys
          d = json.load(open('/tmp/cf_resp'))
          if not d.get('success'):
              print('FAIL:', json.dumps(d.get('errors', []), indent=2))
              sys.exit(1)
          r = d['result']
          print(f'  deployment id: {r[\"id\"]}')
          print(f'  url:           {r.get(\"url\", \"-\")}')
          for a in (r.get('aliases') or []):
              print(f'  alias:         {a}')
          print(f'  branch:        {r.get(\"deployment_trigger\", {}).get(\"metadata\", {}).get(\"branch\", \"-\")}')
          print(f'  commit (cf):   {r.get(\"deployment_trigger\", {}).get(\"metadata\", {}).get(\"commit_hash\", \"-\")[:7]}')
          "
          echo ""
          if [ -n "$INPUT_BRANCH" ]; then
            echo "Trigger returned success. Cloudflare will build + deploy from branch '$INPUT_BRANCH'."
          else
            echo "Trigger returned success. Cloudflare will build + deploy from main branch HEAD."
          fi
          echo "(Note: trigger success ≠ build success. Check the Cloudflare dashboard if anything looks off.)"
