<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Genus dashboard — v0.6 skeleton</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:#f4f5f7;color:#16181d;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;padding:24px}
    main{max-width:560px;text-align:center}
    h1{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:14px}
    p{font-size:15px;color:#6b7280;line-height:1.6;margin-bottom:10px}
    code{font-family:'JetBrains Mono',monospace;font-size:13px;background:#eceef1;padding:2px 6px;border-radius:4px}
    .meta{margin-top:28px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#9aa1ae;letter-spacing:.06em;text-transform:uppercase}
    .accent{color:#2f6bff;font-weight:600}
  </style>
</head>
<body>
  <main>
    <h1>Genus dashboard — v0.6 build</h1>
    <p>Skeleton deploy from <code>Tij8i/Genus</code>. If you can read this, Cloudflare Pages is serving the new repo.</p>
    <p>Substrate reads still target <code>Tij8i/Orchestrator</code> via Pages Functions (per the migration plan, path A).</p>
    <p class="meta"><span class="accent">v0.6.0-skeleton</span> · <span id="now"></span></p>
  </main>
  <script>
    document.getElementById('now').textContent = new Date().toISOString().slice(0, 19) + 'Z';
  </script>
</body>
</html>
